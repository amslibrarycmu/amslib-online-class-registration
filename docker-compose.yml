networks:
  amslib-network:
    driver: bridge

services:
  gateway:
    image: nginx:alpine
    container_name: amslib_gateway
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - amslib-network

  mysql:
    image: mysql:8.0
    container_name: amslib_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      start_period: 10s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - amslib-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amslib_backend
    restart: always
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_AUTH_USER: ${EMAIL_AUTH_USER}
      EMAIL_AUTH_PASS: ${EMAIL_AUTH_PASS}
      MS_ENTRA_ID_CLIENT_ID: ${MS_ENTRA_ID_CLIENT_ID}
      MS_ENTRA_ID_CLIENT_SECRET: ${MS_ENTRA_ID_CLIENT_SECRET}
      MS_ENTRA_ID_TENANT_ID: ${MS_ENTRA_ID_TENANT_ID}
      MS_ENTRA_ID_REDIRECT_URI: ${MS_ENTRA_ID_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - amslib_uploads:/app/backend/uploads
    command: npm start
    ports:
      - '5000:5000'
    networks:
      - amslib-network


volumes:
  mysql_data:
  amslib_uploads:
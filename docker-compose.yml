version: '3.8'

networks:
  amslib-network:
    driver: bridge

services:
  gateway:
    image: nginx:alpine
    container_name: amslib_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php_app
      - js_app_amslibclass
    networks:
      - amslib-network

  php_app:
    build:
      context: ./html/php
      dockerfile: Dockerfile
    container_name: amslib_php
    restart: always
    volumes:
      - ./html/php/html:/var/www/html
      - ./html/php/config/php.ini:/usr/local/etc/php/conf.d/custom.ini
    ports:
      - '8089:80'
    networks:
      - amslib-network

  js_app_amslibclass:
    build: 
      context: ./html/js/src/amslibclass
    container_name: amslib_js_amslibclass
    restart: always
    env_file:
      - ./html/js/src/amslibclass/.env
    environment:
      - DB_HOST=db
      - PORT=5000
    volumes: 
      - ./html/js/src/amslibclass/dist:/app/dist
      - ./html/js/src/amslibclass/uploads:/app/uploads
    ports:
      - '8109:5000'
    networks:
      - amslib-network


volumes:
  mysql_data: